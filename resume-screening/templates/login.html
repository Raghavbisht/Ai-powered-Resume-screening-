<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResumeAI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e2937;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.15);
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 12px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="text-center mb-4">
                <i class="bi bi-robot fs-1 text-primary"></i>
                <h2 class="fw-bold mt-3">Welcome Back</h2>
                <p class="text-muted">Sign in to access AI Resume Screening</p>
            </div>

            <div class="card p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username or Email</label>
                        <input type="text" class="form-control" name="username" placeholder="Enter your username or email" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Login
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0">Don't have an account? 
                        <a href="/signup" class="text-primary fw-semibold">Sign Up</a>
                    </p>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/" class="text-muted small">
                    ← Back to Resume Screening
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
