<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ResumeAI - AI Resume Screening{% endblock %}</title>

    <!-- Bootstrap 5.3 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e2937;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            color: #1e2937;
        }
        .navbar {
            background: var(--dark);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        }
        /* ... keep all your other CSS styles here (upload-area, btn-primary, etc.) ... */
        .hero-section {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.12);
            overflow: hidden;
        }
        /* Paste the rest of your <style> content here */
    </style>
</head>
<body>

<!-- Navbar (now shared across all pages) -->
<nav class="navbar navbar-dark py-3">
    <div class="container">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-robot fs-3 text-primary"></i>
            <span class="navbar-brand fw-bold fs-4">ResumeAI</span>
        </div>

        <div class="d-flex align-items-center gap-3">
            {% if user.is_authenticated %}
                <span class="text-light">Welcome, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </a>
                <a href="{% url 'signup' %}" class="btn btn-primary btn-sm">
                    <i class="bi bi-person-plus"></i> Sign Up
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container py-5">
    {% block content %}
    <!-- Child templates will fill this block -->
    {% endblock %}
</div>

<!-- Footer -->
<footer class="py-5 text-center text-muted small">
    <p>ResumeAI © 2026 • Intelligent Recruitment Platform</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
